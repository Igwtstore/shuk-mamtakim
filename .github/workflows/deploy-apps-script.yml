name: Deploy Apps Script

on:
  push:
    branches: [main]
    paths:
      - motor-v2.js
      - appsscript.json

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push & deploy (motor v2 — un solo web app sirve las 3 puertas)
        run: |
          clasp push -f
          # Motor v2 (Shuk + Candy + Tienda usan esta misma URL)
          clasp deploy -i AKfycbxO71AD5tBy1KpWCP0K9-uBEZEc7Qv1ehMv3PA3zDQwngwj7XHMLgIY6M7vWosr7-nc
