<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuk Hijos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; }

  /* LOGIN */
  #login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; gap: 20px; }
  #login h1 { font-size: 2rem; color: #5c3d1e; }
  #login p { color: #888; font-size: 0.95rem; }
  .user-btns { display: flex; gap: 16px; margin-top: 8px; }
  .user-btn { flex: 1; padding: 28px 32px; border: none; border-radius: 20px; font-size: 1.4rem; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .user-btn:active { transform: scale(0.96); }
  .btn-meir { background: linear-gradient(135deg, #4a90d9, #2c6fad); color: white; }
  .btn-iosi { background: linear-gradient(135deg, #e8854a, #c45e20); color: white; }

  /* PANEL */
  #panel { display: none; flex-direction: column; min-height: 100vh; }
  .header { padding: 20px 16px 16px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; color: white; }
  .avatar-meir { background: linear-gradient(135deg, #4a90d9, #2c6fad); }
  .avatar-iosi { background: linear-gradient(135deg, #e8854a, #c45e20); }
  .header h2 { font-size: 1.3rem; color: #2d1a0a; }
  .header small { color: #888; font-size: 0.8rem; }
  .btn-logout { background: none; border: 1px solid #ddd; border-radius: 10px; padding: 8px 14px; color: #888; font-size: 0.85rem; cursor: pointer; }
  .btn-refresh { background: none; border: 1px solid #ddd; border-radius: 10px; padding: 8px 14px; color: #888; font-size: 0.85rem; cursor: pointer; margin-right: 8px; }

  .content { padding: 0 16px 32px; display: flex; flex-direction: column; gap: 16px; }

  /* CARDS */
  .card { background: white; border-radius: 16px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .card-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #aaa; margin-bottom: 14px; }

  /* RESUMEN */
  .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .resumen-item { background: #f8f4ee; border-radius: 12px; padding: 14px; text-align: center; }
  .resumen-num { font-size: 1.5rem; font-weight: 800; color: #2d1a0a; }
  .resumen-label { font-size: 0.75rem; color: #999; margin-top: 2px; }

  /* VENTAS */
  .venta-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0ebe3; }
  .venta-item:last-child { border-bottom: none; }
  .venta-info { flex: 1; }
  .venta-nombre { font-weight: 600; color: #2d1a0a; font-size: 0.95rem; }
  .venta-cliente { font-size: 0.8rem; color: #999; margin-top: 2px; }
  .venta-precio { font-weight: 700; color: #5c3d1e; font-size: 0.95rem; white-space: nowrap; }
  .badge-debe { background: #fff3e0; color: #e8854a; font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 6px; margin-left: 6px; }
  .empty { color: #bbb; font-size: 0.9rem; text-align: center; padding: 16px 0; }

  /* DEUDORES */
  .deudor-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0ebe3; }
  .deudor-item:last-child { border-bottom: none; }
  .deudor-nombre { font-weight: 600; color: #2d1a0a; }
  .deudor-monto { font-weight: 800; color: #e05c2a; }
  .total-row { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 2px solid #f0ebe3; }
  .total-label { font-weight: 700; color: #5c3d1e; }
  .total-monto { font-weight: 800; color: #2d1a0a; font-size: 1.1rem; }

  /* CATALOGO */
  .cat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0ebe3; }
  .cat-item:last-child { border-bottom: none; }
  .cat-codigo { background: #f0ebe3; color: #5c3d1e; font-weight: 700; font-size: 0.8rem; padding: 4px 8px; border-radius: 6px; margin-right: 10px; }
  .cat-nombre { flex: 1; color: #2d1a0a; font-size: 0.9rem; }
  .cat-precio { font-weight: 700; color: #5c3d1e; }

  /* SPINNER */
  .spinner { text-align: center; padding: 24px; color: #bbb; font-size: 0.9rem; }

  /* COLOR ACCENT */
  .accent-meir { color: #2c6fad; }
  .accent-iosi { color: #c45e20; }
  .header-meir { background: linear-gradient(135deg, #e8f0fa, #f5f0e8); }
  .header-iosi { background: linear-gradient(135deg, #faf0e8, #f5f0e8); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div style="font-size: 2.5rem">🍬</div>
  <h1>Shuk Mamtakim</h1>
  <p>¿Quién sos?</p>
  <div class="user-btns">
    <button class="user-btn btn-meir" onclick="login('Meir')">👦 Meir</button>
    <button class="user-btn btn-iosi" onclick="login('Iosi')">👦 Iosi</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="header" id="header">
    <div class="header-left">
      <div class="avatar" id="avatar"></div>
      <div>
        <h2 id="header-nombre"></h2>
        <small id="header-fecha"></small>
      </div>
    </div>
    <div>
      <button class="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="content">
    <!-- Resumen -->
    <div class="card">
      <div class="card-title">Hoy</div>
      <div class="resumen-grid">
        <div class="resumen-item">
          <div class="resumen-num" id="res-ventas">—</div>
          <div class="resumen-label">Ventas</div>
        </div>
        <div class="resumen-item">
          <div class="resumen-num" id="res-total">—</div>
          <div class="resumen-label">Total cobrado</div>
        </div>
        <div class="resumen-item">
          <div class="resumen-num" id="res-deudores">—</div>
          <div class="resumen-label">Deudores</div>
        </div>
        <div class="resumen-item">
          <div class="resumen-num" id="res-deuda">—</div>
          <div class="resumen-label">Total deuda</div>
        </div>
      </div>
    </div>

    <!-- Ventas del día -->
    <div class="card">
      <div class="card-title">Ventas de hoy</div>
      <div id="ventas-list"><div class="spinner">Cargando...</div></div>
    </div>

    <!-- Deudores -->
    <div class="card">
      <div class="card-title">Te deben</div>
      <div id="deudores-list"><div class="spinner">Cargando...</div></div>
    </div>

    <!-- Catálogo -->
    <div class="card">
      <div class="card-title">Mis productos</div>
      <div id="catalogo-list"><div class="spinner">Cargando...</div></div>
    </div>
  </div>
</div>

<script>
const APPS_URL = 'https://script.google.com/macros/s/AKfycbxdAaSjGfBQoMz_38kHvTvUNswM94BdQexq5IDAINgTbvgpNOcOdyu8TXIHsbAZWAJ-hA/exec';
let usuarioActual = null;

function fmt(n) {
  return '$' + (parseFloat(n)||0).toLocaleString('es-AR');
}

function login(nombre) {
  usuarioActual = nombre;
  sessionStorage.setItem('hijo', nombre);
  document.getElementById('login').style.display = 'none';
  document.getElementById('panel').style.display = 'flex';

  const avatar = document.getElementById('avatar');
  avatar.textContent = nombre === 'Meir' ? 'M' : 'I';
  avatar.className = 'avatar avatar-' + nombre.toLowerCase();

  document.getElementById('header').className = 'header header-' + nombre.toLowerCase();
  document.getElementById('header-nombre').textContent = nombre;

  const hoy = new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('header-fecha').textContent = hoy;

  cargarDatos();
}

function logout() {
  sessionStorage.removeItem('hijo');
  usuarioActual = null;
  document.getElementById('login').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
}

async function api(accion, extra = {}) {
  const p = new URLSearchParams({ accion, ...extra });
  const res = await fetch(APPS_URL + '?' + p.toString());
  return res.json();
}

async function cargarDatos() {
  const hijo = usuarioActual;
  document.getElementById('ventas-list').innerHTML = '<div class="spinner">Cargando...</div>';
  document.getElementById('deudores-list').innerHTML = '<div class="spinner">Cargando...</div>';
  document.getElementById('catalogo-list').innerHTML = '<div class="spinner">Cargando...</div>';

  const [ventas, deudores, catalogo] = await Promise.all([
    api('ventasHoy', { hijo }),
    api('consultarDeudores', { hijo }),
    api('getCatalogoHijos')
  ]);

  renderVentas(ventas || []);
  renderDeudores(deudores || []);
  renderCatalogo(catalogo || []);
}

function renderVentas(ventas) {
  const el = document.getElementById('ventas-list');
  const resVentas = document.getElementById('res-ventas');
  const resTotal = document.getElementById('res-total');

  if (!ventas.length) {
    el.innerHTML = '<div class="empty">Sin ventas hoy todavía 😴</div>';
    resVentas.textContent = '0';
    resTotal.textContent = '$0';
    return;
  }

  let totalCobrado = 0;
  let html = '';
  ventas.forEach(v => {
    const subtotal = (v.precio || 0) * (v.cantidad || 1);
    const cobrado = subtotal - (v.saldoPendiente || 0);
    totalCobrado += cobrado;
    html += `<div class="venta-item">
      <div class="venta-info">
        <div class="venta-nombre">${v.cantidad}x ${v.producto}${v.saldoPendiente > 0 ? '<span class="badge-debe">DEBE</span>' : ''}</div>
        ${v.cliente ? `<div class="venta-cliente">👤 ${v.cliente}</div>` : ''}
      </div>
      <div class="venta-precio">${fmt(subtotal)}</div>
    </div>`;
  });

  el.innerHTML = html;
  resVentas.textContent = ventas.length;
  resTotal.textContent = fmt(totalCobrado);
}

function renderDeudores(deudores) {
  const el = document.getElementById('deudores-list');
  const resDeudores = document.getElementById('res-deudores');
  const resDeuda = document.getElementById('res-deuda');

  if (!deudores.length) {
    el.innerHTML = '<div class="empty">¡Nadie te debe nada! 🎉</div>';
    resDeudores.textContent = '0';
    resDeuda.textContent = '$0';
    return;
  }

  let totalDeuda = 0;
  let html = '';
  deudores.forEach(d => {
    totalDeuda += d.saldo || 0;
    html += `<div class="deudor-item">
      <div class="deudor-nombre">👤 ${d.cliente}</div>
      <div class="deudor-monto">${fmt(d.saldo)}</div>
    </div>`;
  });
  html += `<div class="total-row">
    <div class="total-label">Total</div>
    <div class="total-monto">${fmt(totalDeuda)}</div>
  </div>`;

  el.innerHTML = html;
  resDeudores.textContent = deudores.length;
  resDeuda.textContent = fmt(totalDeuda);
}

function renderCatalogo(catalogo) {
  const el = document.getElementById('catalogo-list');
  if (!catalogo.length) {
    el.innerHTML = '<div class="empty">Catálogo vacío</div>';
    return;
  }
  el.innerHTML = catalogo.map(p => `
    <div class="cat-item">
      <span class="cat-codigo">${p.codigo}</span>
      <span class="cat-nombre">${p.nombre}</span>
      <span class="cat-precio">${fmt(p.precioVenta)}</span>
    </div>`).join('');
}

// Auto-login si hay sesión guardada
const saved = sessionStorage.getItem('hijo');
if (saved) login(saved);
</script>
</body>
</html>
